<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login with TikTok</title>
</head>

<body>

<h2>Login with TikTok</h2>
<button type="button" onclick="login()">Login with TikTok</button>

<script>
const CLIENT_KEY = "ضعي_هنا_SANDBOX_CLIENT_KEY";

const REDIRECT_URI =
  "https://njood-shardob.github.io/ahmedmemar-site/callback.html";

function createState() {
  const bytes = new Uint8Array(32);
  crypto.getRandomValues(bytes);

  return Array.from(bytes)
    .map(byte => byte.toString(16).padStart(2, "0"))
    .join("");
}

function login() {
  const state = createState();

  sessionStorage.setItem("tiktok_oauth_state", state);

  const params = new URLSearchParams({
    client_key: CLIENT_KEY,
    scope: "user.info.basic,video.upload",
    response_type: "code",
    redirect_uri: REDIRECT_URI,
    state: state,
    disable_auto_auth: "1"
  });

  window.location.href =
    "https://www.tiktok.com/v2/auth/authorize/?" +
    params.toString();
}
</script>

</body>
</html>
