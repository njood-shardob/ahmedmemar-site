<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Callback</title>
</head>

<body>

<h2>TikTok Authorization</h2>
<pre id="result">Processing...</pre>

<script>
const result = document.getElementById("result");
const params = new URLSearchParams(window.location.search);

const code = params.get("code");
const state = params.get("state");
const error = params.get("error");
const errorDescription = params.get("error_description");

const expectedState =
  sessionStorage.getItem("tiktok_oauth_state");

if (error) {
  result.textContent =
`TikTok Authorization Error

Error:
${error}

Description:
${errorDescription || "No description returned"}`;
}
else if (!code) {
  result.textContent =
    "No authorization code was returned.";
}
else if (!expectedState || state !== expectedState) {
  result.textContent =
`Security Error

The returned state does not match the original state.
Start the TikTok login process again.`;
}
else {
  sessionStorage.removeItem("tiktok_oauth_state");

  result.textContent =
`Authorization Code

${code}

--------------------------------

Copy this code exactly into n8n.
Do not reuse it.`;
}
</script>

</body>
</html>
