<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login with TikTok</title>
</head>
<body>

<h2>Login with TikTok</h2>

<button onclick="login()">Login with TikTok</button>

<script>

const CLIENT_KEY = "awlefdh53wg2cyfi";

const REDIRECT_URI = "https://njood-shardob.github.io/ahmedmemar-site/callback.html";

function randomString(length){
    const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let result="";
    for(let i=0;i<length;i++){
        result+=chars.charAt(Math.floor(Math.random()*chars.length));
    }
    return result;
}

async function sha256(text){
    const data=new TextEncoder().encode(text);
    const hash=await crypto.subtle.digest("SHA-256",data);
    return btoa(String.fromCharCode(...new Uint8Array(hash)))
        .replace(/\+/g,"-")
        .replace(/\//g,"_")
        .replace(/=+$/,"");
}

async function login(){

    const codeVerifier=randomString(64);

    sessionStorage.setItem("code_verifier",codeVerifier);

    const challenge=await sha256(codeVerifier);

    const state=randomString(16);

    const url=
`https://www.tiktok.com/v2/auth/authorize/?client_key=${CLIENT_KEY}&scope=user.info.basic,video.publish&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&state=${state}&code_challenge=${challenge}&code_challenge_method=S256`;

    location.href=url;
}

</script>

</body>
</html>
